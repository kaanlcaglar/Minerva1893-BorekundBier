<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Benefiz im Kiez 2026 — Squads</title>
<style>
  :root{
    --pitch:#2e7d46; --line:rgba(255,255,255,.75);
    --bg:#111511; --card-text:#f2f2ee; --muted:#9aa79c;
    --badge:#ffffff; --badge-text:#15221a; --gk:#f5c542;
    --accent:#4caf50;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--card-text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;padding:env(safe-area-inset-top,20px) 14px 40px;-webkit-text-size-adjust:100%}
  header{text-align:center;margin-bottom:24px;padding-top:16px}
  header h1{font-size:clamp(20px,5vw,28px);letter-spacing:.3px;line-height:1.3}
  .meta{color:var(--muted);font-size:clamp(12px,3vw,14px);margin-top:6px;line-height:1.5}
  .meta strong{color:var(--card-text)}
  .link{display:inline-block;margin-top:12px;padding:8px 16px;background:var(--accent);color:#fff;text-decoration:none;border-radius:6px;font-size:13px;font-weight:600;transition:opacity .2s}
  .link:hover{opacity:.85}
  .link:active{opacity:.7}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;max-width:960px;margin:0 auto}
  @media(min-width:860px){.grid{grid-template-columns:repeat(4,1fr)}}
  @media(max-width:440px){.grid{grid-template-columns:1fr 1fr;gap:10px}}
  .card{min-width:0}
  .title{font-size:clamp(11px,3vw,13px);font-weight:700;margin:0 0 1px 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sub{font-size:11px;color:var(--muted);margin:0 0 6px 2px}
  .pitch{position:relative;aspect-ratio:3/4;background:var(--pitch);border:1.5px solid var(--line);border-radius:8px;overflow:hidden}
  .half{position:absolute;top:50%;left:0;right:0;height:1px;background:var(--line);opacity:.4}
  .circle{position:absolute;top:50%;left:50%;width:20%;aspect-ratio:1;border:1px solid var(--line);border-radius:50%;transform:translate(-50%,-50%);opacity:.4}
  .box{position:absolute;left:28%;right:28%;bottom:0;height:13%;border:1.5px solid var(--line);border-bottom:none;border-radius:2px 2px 0 0}
  .goal{position:absolute;left:39%;right:39%;bottom:-1px;height:3px;background:var(--line);border-radius:2px}
  .pl{position:absolute;transform:translate(-50%,-50%);text-align:center;width:clamp(48px,18vw,70px)}
  .dot{display:inline-flex;align-items:center;justify-content:center;width:clamp(20px,6vw,24px);height:clamp(20px,6vw,24px);border-radius:50%;background:var(--badge);color:var(--badge-text);font-size:clamp(7px,2vw,9px);font-weight:800}
  .gk .dot{background:var(--gk)}
  .nm{display:block;font-size:clamp(9px,2.5vw,11px);font-weight:600;margin-top:2px;text-shadow:0 1px 2px rgba(0,0,0,.5);white-space:nowrap}
  footer{text-align:center;margin-top:32px;color:var(--muted);font-size:11px}
  footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<header>
  <h1>Benefiz im Kiez 2026</h1>
  <div class="meta">
    <strong>Sunday, July 5</strong> &middot; 11:00 – 16:00<br>
    Willi-Boos-Stadion, Berlin<br>
    6v6 (5+1) &middot; 6 group games + final
  </div>
  <a class="link" href="https://www.meinturnierplan.de/c/zx02jq3f/benefiz-im-kiez-2026/" target="_blank" rel="noopener">
    View Tournament Schedule &rarr;
  </a>
</header>

<div class="grid" id="grid"></div>

<footer>
  Borekund &amp; Bier &middot; <a href="https://www.meinturnierplan.de/c/zx02jq3f/benefiz-im-kiez-2026/" target="_blank" rel="noopener">meinturnierplan.de</a>
</footer>

<script>
const P=(pos,nm,x,y,gk)=>({pos,nm,x,y,gk});
const backs=(l,c,r)=>[P('LB',l,22,63),P('CB',c,50,63),P('RB',r,78,63)];
const std=(st,cm,l,c,r)=>[P('ST',st,50,14),P('CM',cm,50,38),...backs(l,c,r),P('GK','Kenan',50,87,1)];
const squads=[
 {t:'Squad 1',f:'3-1-1',p:std('William','Gulam','Andrei','Murat','Sadegh')},
 {t:'Squad 2',f:'3-1-1',p:std('Fatih','Genc','Serghei','Murat','Sadegh')},
 {t:'Squad 3',f:'3-1-1',p:std('William','Gulam','Andrei','Murat','Sadegh')},
 {t:'Squad 4',f:'3-1-1',p:std('William','Serkan','Emre','Dincer','Emrah')},
 {t:'Squad 5',f:'3-1-1',p:std('Sadegh','Gulam','Gokten','Murat','Ender')},
 {t:'Squad 6',f:'3-1-1',p:std('William','Gulam','Andrei','Murat','Dincer')},
 {t:'Agile Squad',f:'3-1-1',p:std('William','Gulam','Andrei','Murat','Sadegh')},
 {t:'Defence Squad',f:'3-2',p:[P('CM','Genc',32,26),P('CM','Gulam',68,26),...backs('Andrei','Murat','Dincer'),P('GK','Kenan',50,87,1)]}
];
document.getElementById('grid').innerHTML=squads.map(s=>`<div class="card">
 <p class="title">${s.t}</p><p class="sub">${s.f}</p>
 <div class="pitch"><div class="half"></div><div class="circle"></div><div class="box"></div><div class="goal"></div>
  ${s.p.map(p=>`<div class="pl${p.gk?' gk':''}" style="left:${p.x}%;top:${p.y}%"><span class="dot">${p.pos}</span><span class="nm">${p.nm}</span></div>`).join('')}
 </div></div>`).join('');
</script>
</body>
</html>
